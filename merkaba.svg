<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Outer Star of David / Merkabá -->
  <!-- Triangle pointing up -->
  <polygon
    points="200,40 350,300 50,300"
    stroke="rgba(201,169,110,0.55)"
    stroke-width="1.5"
    fill="rgba(201,169,110,0.03)"
  />
  <!-- Triangle pointing down -->
  <polygon
    points="200,360 50,100 350,100"
    stroke="rgba(201,169,110,0.55)"
    stroke-width="1.5"
    fill="rgba(201,169,110,0.03)"
  />
  <!-- Inner hexagon lines (where triangles intersect) -->
  <polygon
    points="200,107 280,247 120,247"
    stroke="rgba(201,169,110,0.25)"
    stroke-width="0.8"
    fill="none"
  />
  <polygon
    points="200,293 120,153 280,153"
    stroke="rgba(201,169,110,0.25)"
    stroke-width="0.8"
    fill="none"
  />
  <!-- Center circle -->
  <circle cx="200" cy="200" r="28" stroke="rgba(201,169,110,0.4)" stroke-width="1" fill="rgba(201,169,110,0.05)" />
  <circle cx="200" cy="200" r="4" fill="rgba(201,169,110,0.6)" />
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="170" stroke="rgba(201,169,110,0.12)" stroke-width="0.8" stroke-dasharray="4 6" fill="none" />
</svg>
