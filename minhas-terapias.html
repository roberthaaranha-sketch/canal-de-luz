<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Terapias · Robertha Aranha · Canal de Luz</title>
<link rel="stylesheet" href="style.css">
<style>
  .area-wrap { min-height: 100vh; position: relative; z-index: 1; padding: 6rem 0 4rem; }
  .area-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem;
  }
  .area-header h1 {
    font-family: var(--ff-head); font-weight: 300; font-size: 2.2rem; color: var(--white);
  }
  .btn-sair {
    border: 1px solid var(--border); color: var(--muted); background: transparent;
    padding: 0.6rem 1.25rem; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
    border-radius: 2px; cursor: pointer; transition: border-color .3s, color .3s;
  }
  .btn-sair:hover { border-color: var(--gold); color: var(--gold); }

  .entrega-card {
    background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: 4px;
    padding: 1.5rem 1.75rem; margin-bottom: 1rem;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
  }
  .entrega-info .terapia { font-family: var(--ff-head); font-size: 1.2rem; color: var(--gold); }
  .entrega-info .detalhe { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
  .estado-vazio, .estado-erro { text-align: center; color: var(--muted); padding: 3rem 0; }

  .cancelar-area {
    margin-top: 3.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  .cancelar-area p { color: var(--muted); font-size: 0.85rem; max-width: 480px; margin: 0 auto 1rem; line-height: 1.7; }
  .btn-cancelar {
    border: 1px solid rgba(224,138,138,0.5);
    color: #e08a8a;
    background: transparent;
    padding: 0.65rem 1.5rem;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    transition: background .3s, border-color .3s;
  }
  .btn-cancelar:hover { border-color: #e08a8a; background: rgba(224,138,138,0.08); }
  .cancelar-msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2em; }
</style>
</head>
<body>
<div id="starfield"></div>

<div class="container area-wrap">
  <div class="area-header fade-up visible">
    <h1>Minhas Terapias</h1>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </div>

  <div id="lista-entregas">
    <p class="estado-vazio">Carregando suas entregas...</p>
  </div>

  <div class="cancelar-area">
    <p>
      Suas gravações e documentos ficam guardados aqui enquanto seu acesso estiver ativo.
      Você pode cancelar esse acesso quando quiser — isso apaga definitivamente todas as
      suas entregas deste espaço, de forma irreversível.
    </p>
    <button class="btn-cancelar" id="btn-cancelar">Cancelar meu acesso</button>
    <p class="cancelar-msg" id="cancelar-msg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = "https://nnwlhzpltvxxfxtuwvvd.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_yir6x_R64EHbOpWyOcnd4w_fT7hqhRF";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const lista = document.getElementById("lista-entregas");

  async function carregar() {
    const { data: sessionData } = await supabaseClient.auth.getSession();
    if (!sessionData.session) {
      window.location.href = "login.html";
      return;
    }

    const { data: entregas, error } = await supabaseClient
      .from("entregas")
      .select("*")
      .order("data_sessao", { ascending: false });

    if (error) {
      lista.innerHTML = `<p class="estado-erro">Não foi possível carregar suas terapias agora. Tente de novo em instantes.</p>`;
      return;
    }

    if (!entregas || entregas.length === 0) {
      lista.innerHTML = `<p class="estado-vazio">Ainda não há nenhuma entrega disponível aqui. Assim que sua próxima sessão for processada, ela aparece nesta página.</p>`;
      return;
    }

    lista.innerHTML = "";
    for (const entrega of entregas) {
      const { data: signedUrlData } = await supabaseClient
        .storage
        .from("entregas")
        .createSignedUrl(entrega.arquivo_path, 60 * 30); // link válido por 30 minutos

      const card = document.createElement("div");
      card.className = "entrega-card fade-up visible";
      card.innerHTML = `
        <div class="entrega-info">
          <div class="terapia">${entrega.terapia}</div>
          <div class="detalhe">${new Date(entrega.data_sessao).toLocaleDateString("pt-BR")}</div>
        </div>
        <a class="btn-card" href="${signedUrlData ? signedUrlData.signedUrl : "#"}" target="_blank" rel="noopener">Baixar PDF</a>
      `;
      lista.appendChild(card);
    }
  }

  document.getElementById("btn-sair").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  });

  document.getElementById("btn-cancelar").addEventListener("click", cancelarAcesso);

  async function cancelarAcesso() {
    const cancelarMsg = document.getElementById("cancelar-msg");

    const confirmar = window.confirm(
      "Tem certeza? Isso vai apagar definitivamente todas as suas gravações e documentos " +
      "guardados aqui. Essa ação não pode ser desfeita."
    );
    if (!confirmar) return;

    cancelarMsg.textContent = "Cancelando seu acesso...";
    cancelarMsg.style.color = "var(--muted)";

    const { data: sessionData } = await supabaseClient.auth.getSession();
    const user = sessionData.session ? sessionData.session.user : null;
    if (!user) { window.location.href = "login.html"; return; }

    // 1) buscar todas as entregas da própria cliente
    const { data: entregas, error: erroBusca } = await supabaseClient
      .from("entregas")
      .select("arquivo_path")
      .eq("user_id", user.id);

    if (erroBusca) {
      cancelarMsg.textContent = "Não foi possível cancelar agora. Tente novamente em instantes.";
      cancelarMsg.style.color = "#e08a8a";
      return;
    }

    // 2) apagar os arquivos da própria pasta no Storage
    const caminhos = (entregas || []).map(e => e.arquivo_path);
    if (caminhos.length > 0) {
      await supabaseClient.storage.from("entregas").remove(caminhos);
    }

    // 3) apagar as linhas da tabela
    await supabaseClient.from("entregas").delete().eq("user_id", user.id);

    // 4) encerrar a sessão
    await supabaseClient.auth.signOut();

    // 5) avisar Robertha para desativar o login (único passo que ainda depende dela)
    const emailCliente = user.email || "";
    const textoWhats = encodeURIComponent(
      `Oi Robertha, acabei de cancelar meu acesso à área de terapias no site (e-mail: ${emailCliente}). Pode desativar meu login, por favor?`
    );

    document.querySelector(".area-wrap").innerHTML = `
      <div class="entrega-card" style="display:block;text-align:center;">
        <p style="color:var(--white);font-family:var(--ff-head);font-size:1.3rem;margin-bottom:1rem;">
          Seu acesso foi cancelado
        </p>
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;">
          Todas as suas gravações e documentos foram apagados deste espaço.
          Avise Robertha para finalizar o cancelamento do seu login:
        </p>
        <a class="btn-card" href="https://wa.me/5511984309434?text=${textoWhats}" target="_blank" rel="noopener">
          Avisar pelo WhatsApp
        </a>
      </div>
    `;
  }

  carregar();
</script>
</body>
</html>
